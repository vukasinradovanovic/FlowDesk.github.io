<div class="container py-4" style="max-width: 800px">
	<h2 class="fw-bold mb-1">Modify Existing Project</h2>
	<p class="small mb-4">
		Update metrics, metrics, or statuses for this active tracker instance.
	</p>

	@if (projectToEdit()) {
		<app-project-form
			submitLabel="Update Details"
			[initialData]="projectToEdit()"
            [hasRangePicker]="true"
			(formSubmit)="handleUpdate($event)"
		>
		</app-project-form>
	} @else {
		<div class="text-center py-5">
			<div class="spinner-border text-primary text-secondary"></div>
		</div>
	}
</div>
