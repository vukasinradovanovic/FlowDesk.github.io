<div class="d-flex justify-content-between align-items-start mb-4">
    <div>
        <h5 class="fw-semibold mb-1">Productivity Overview</h5>
        <p class="text-secondary small mb-0">Task completions over the last {{ activeFilter() }}</p>
    </div>
    <div class="btn-group btn-group-sm" role="group">
        <button 
            type="button" 
            class="btn btn-chip" 
            [class.active]="activeFilter() === 'day'"
            (click)="setFilter('day')">
            Day
        </button>
        <button 
            type="button" 
            class="btn btn-chip" 
            [class.active]="activeFilter() === 'week'"
            (class.active)="activeFilter() === 'week'"
            (click)="setFilter('week')">
            Week
        </button>
        <button 
            type="button" 
            class="btn btn-chip" 
            [class.active]="activeFilter() === 'month'"
            (click)="setFilter('month')">
            Month
        </button>
    </div>
</div>

<div style="position: relative; height: 110px;">
    <canvas #chartCanvas></canvas>
</div>
